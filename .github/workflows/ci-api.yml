name: CI - EscolarBH API (Spring Boot)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'escolarbh-api/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'escolarbh-api/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./escolarbh-api

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build and Test
      run: ./gradlew build
      
    # Exemplo: Se quisermos fazer build da imagem Docker no CI e jogar num Container Registry
    # - name: Build Docker Image
    #   run: docker build -t escolarbh-api:latest .
