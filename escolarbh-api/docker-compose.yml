# ============================================================
# EscolarBH — Docker Compose para Desenvolvimento Local
# ============================================================
# Uso: docker-compose up -d
# Nota: Em produção, o banco é Supabase (cloud).
#       Este compose é apenas para dev/testes locais.
# ============================================================

services:
  # ── PostgreSQL 16 + PostGIS 3.4 ──
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: escolarbh-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: escolarbh
      POSTGRES_USER: escolarbh_dev
      POSTGRES_PASSWORD: dev_password_change_me
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escolarbh_dev -d escolarbh"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis 7 (Cache + Sessions) ──
  redis:
    image: redis:7-alpine
    container_name: escolarbh-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
